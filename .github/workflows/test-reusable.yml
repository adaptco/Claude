name: Reusable Test & Lint

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.12'
      fail-under:
        required: false
        type: string
        default: '8.0'
    outputs:
      coverage:
        description: "Coverage percentage"
        value: ${{ jobs.test.outputs.coverage }}

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pylint

    - name: Run unit tests
      run: |
        pytest tests/test_harness.py -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

    - name: Extract coverage percentage
      id: coverage
      run: |
        COVERAGE=$(grep 'TOTAL' .coverage.term-missing || echo "0%")
        echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT

    - name: Run strict linting checks
      run: |
        pylint bytesampler_adapter.py \
          --rcfile=.pylintrc \
          --fail-under=${{ inputs.fail-under }} \
          --disable=C0114,C0115,C0116

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
