name: Deploy to Kubernetes

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY_ORG: ${REGISTRY_ORG}
  IMAGE_NAME: ${IMAGE_NAME}
  GITHUB_ORG: ${GITHUB_ORG}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read
      packages: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Get image tag
      id: image
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          TAG=${GITHUB_REF#refs/tags/}
        else
          TAG=${{ github.sha }}
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/control-plane-proxy \
          control-plane=${{ env.REGISTRY_ORG }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }} \
          -n control-plane \
          --record

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/control-plane-proxy \
          -n control-plane \
          --timeout=5m

    - name: Verify deployment
      run: |
        kubectl get pods -n control-plane -l app=control-plane-proxy
        kubectl logs -n control-plane -l app=control-plane-proxy --tail=50

    - name: Send deployment notification
      if: always()
      run: |
        STATUS="${{ job.status }}"
        WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK }}"
        curl -X POST $WEBHOOK_URL \
          -H 'Content-Type: application/json' \
          -d "{\"text\": \"Deployment to ${{ github.event.inputs.environment || 'staging' }} $STATUS - Version: ${{ steps.image.outputs.tag }}\"}"
