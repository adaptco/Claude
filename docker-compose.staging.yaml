version: '3.9'

services:
  control-plane-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control-plane-proxy-staging
    ports:
      - "8080:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: "DEBUG"
      BACKEND_URL: "http://music-video-backend:8000"
      VVL_DB_URL: "postgresql://vvl:vvl_dev@postgres:5432/vvl_staging"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - control-plane
    volumes:
      - ./src:/app/src
      - vvl-cache:/app/vvl-cache
    labels:
      - "com.example.environment=staging"
    command: python -u bytesampler_adapter.py

  postgres:
    image: postgres:16-alpine
    container_name: vvl-postgres-staging
    environment:
      POSTGRES_USER: vvl
      POSTGRES_PASSWORD: vvl_dev
      POSTGRES_DB: vvl_staging
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vvl"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - control-plane
    volumes:
      - postgres-data:/var/lib/postgresql/data
    labels:
      - "com.example.environment=staging"

  redis:
    image: redis:7-alpine
    container_name: control-plane-cache-staging
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - control-plane
    volumes:
      - redis-data:/data
    labels:
      - "com.example.environment=staging"

  # Prometheus for metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-staging
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - control-plane
    labels:
      - "com.example.environment=staging"

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  vvl-cache:
    driver: local
  prometheus-data:
    driver: local

networks:
  control-plane:
    driver: bridge
