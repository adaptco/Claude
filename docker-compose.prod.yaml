version: '3.9'

services:
  control-plane-proxy:
    image: ghcr.io/your-org/control-plane:latest
    container_name: control-plane-proxy
    ports:
      - "8080:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: "INFO"
      BACKEND_URL: "http://music-video-backend:8000"
      VVL_DB_URL: "postgresql://vvl:vvl_password@postgres:5432/vvl"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - control-plane
    volumes:
      - vvl-cache:/app/vvl-cache
    labels:
      - "com.example.environment=production"

  postgres:
    image: postgres:16-alpine
    container_name: vvl-postgres
    environment:
      POSTGRES_USER: vvl
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      POSTGRES_DB: vvl
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vvl"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - control-plane
    volumes:
      - postgres-data:/var/lib/postgresql/data
    labels:
      - "com.example.environment=production"

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: control-plane-cache
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Redis password required}
    restart: unless-stopped
    networks:
      - control-plane
    volumes:
      - redis-data:/data
    labels:
      - "com.example.environment=production"

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  vvl-cache:
    driver: local

networks:
  control-plane:
    driver: bridge
