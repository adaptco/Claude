services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - ./:/app
    environment:
      PYTHONDONTWRITEBYTECODE: "0"
      PYTHONUNBUFFERED: "1"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .git
            - .venv
            - __pycache__
            - .pytest_cache
