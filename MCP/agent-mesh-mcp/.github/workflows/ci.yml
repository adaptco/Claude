name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  node:
    name: Node Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace
        run: pnpm build

      - name: Run workspace tests
        run: pnpm test

      - name: Contract test (bridge vs OpenAPI)
        run: pnpm --filter @agent-mesh/mcp-bridge test -- --test-name-pattern "OpenAPI contract"

  python-sidecar:
    name: Python Sidecar Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar dependencies
        run: pip install -r services/digital-twin-sidecar/requirements.txt

      - name: Run sidecar tests
        run: pytest services/digital-twin-sidecar/tests -q
