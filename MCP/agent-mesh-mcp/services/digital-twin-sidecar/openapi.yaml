openapi: 3.1.0
info:
  title: Digital Twin Sidecar API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:8090
paths:
  /health:
    get:
      operationId: health
      responses:
        '200':
          description: Service health details
  /v1/repo/search:
    post:
      operationId: repoSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                topK:
                  type: integer
                  minimum: 1
                  maximum: 50
                  default: 8
                agentFilter:
                  type: string
      responses:
        '200':
          description: Repository semantic search results
  /v1/twin/state:
    get:
      operationId: twinState
      responses:
        '200':
          description: Digital twin summary
  /v1/twin/tasks:
    get:
      operationId: twinTasks
      parameters:
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: Twin task list
  /v1/twin/task-assigned:
    post:
      operationId: taskAssigned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId, agentId]
              properties:
                taskId:
                  type: string
                agentId:
                  type: string
                taskName:
                  type: string
      responses:
        '200':
          description: Task assignment accepted
  /v1/twin/task-completed:
    post:
      operationId: taskCompleted
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId]
              properties:
                taskId:
                  type: string
                fossilHash:
                  type: string
      responses:
        '200':
          description: Task completion accepted
