name: MCP Server Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  mcp-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Test MCP tools
        run: python bootstrap_digital_twin.py --test-tools
        continue-on-error: true

      - name: Build RAG embeddings
        run: python bootstrap_digital_twin.py --build-rag
        continue-on-error: true

      - name: Test Twin initialization
        run: |
          python -c "
          from digital_twin.twin_registry import TwinRegistry
          twin = TwinRegistry()
          twin.load()
          print(f'Twin initialized: {twin.get_summary()}')
          "
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
