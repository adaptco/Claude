apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2a-digital-twin
  labels:
    app.kubernetes.io/name: a2a-digital-twin
    app.kubernetes.io/part-of: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: a2a-digital-twin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: a2a-digital-twin
      annotations:
        argocd.argoproj.io/owner-org: "__GITHUB_ORG_FOR_ARGOCD__"
    spec:
      containers:
        - name: mcp-server
          image: "__IMAGE__"
          imagePullPolicy: IfNotPresent
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8080"
            - name: A2A_REPO_ROOT
              value: "/app/a2a-digital-twin"
            - name: TWIN_STATE_FILE
              value: "/data/twin_state.json"
            - name: ALLOWED_CORS_ORIGIN
              value: "__ALLOWED_CORS_ORIGIN__"
          envFrom:
            - secretRef:
                name: a2a-digital-twin-secrets
                optional: true
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: twin-state
              mountPath: /data
      volumes:
        - name: twin-state
          emptyDir: {}
