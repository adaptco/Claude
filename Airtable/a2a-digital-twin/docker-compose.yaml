services:
  a2a-digital-twin:
    build:
      context: .
      dockerfile: Dockerfile
    image: a2a-digital-twin:local
    container_name: a2a-digital-twin
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8080
      A2A_REPO_ROOT: /app
    ports:
      - "8080:8080"
    restart: unless-stopped
